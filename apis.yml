    name: SOAP 1.2 Protocol
    description: >-
      SOAP Version 1.2 (W3C Recommendation, 2003/2007 Second Edition) is a lightweight protocol for exchanging structured information in a decentralized, distributed environment. It defines an XML message format with Envelope/Header/Body structure and a Fault mechanism for error handling.
